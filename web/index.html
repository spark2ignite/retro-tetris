<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TETRIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; height: 100%; }

    body {
      background: #080818;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      color: #00ff41;
      overflow: hidden;
      user-select: none;
    }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 200;
    }

    /* CRT vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
      z-index: 199;
    }

    .wrapper {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transform-origin: center center;
    }

    /* ── Side panels ─────────────────────────────────────────── */
    .panel {
      width: 148px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .box {
      border: 2px solid #00cc33;
      padding: 10px 12px;
      background: rgba(0,255,65,0.02);
      box-shadow: 0 0 6px rgba(0,255,65,0.35), inset 0 0 10px rgba(0,255,65,0.04);
    }

    .box-label {
      font-size: 6px;
      color: #00aa22;
      margin-bottom: 7px;
      letter-spacing: 3px;
      text-shadow: 0 0 4px #00ff41;
    }

    .box-value {
      font-size: 12px;
      color: #fff;
      text-shadow: 0 0 6px #00ff41;
      min-height: 18px;
    }

    #game-title {
      font-size: 10px;
      letter-spacing: 8px;
      text-align: center;
      color: #00ff41;
      text-shadow: 0 0 8px #00ff41, 0 0 18px rgba(0,255,65,0.5);
      padding: 10px 0 6px;
      animation: flicker 5s infinite;
    }

    .controls-text {
      font-size: 6px;
      color: #009922;
      line-height: 2.4;
      letter-spacing: 0.5px;
    }

    /* ── Board area ──────────────────────────────────────────── */
    #canvas-wrap {
      position: relative;
      flex-shrink: 0;
    }

    #board {
      display: block;
      border: 3px solid #00ff41;
      box-shadow:
        0 0 12px rgba(0,255,65,0.7),
        0 0 35px rgba(0,255,65,0.25),
        inset 0 0 40px rgba(0,0,0,0.5);
    }

    /* ── Overlay ─────────────────────────────────────────────── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(4,4,20,0.90);
      z-index: 50;
    }

    #overlay .big-title {
      font-size: 30px;
      color: #00ff41;
      text-shadow: 0 0 8px #00ff41, 0 0 22px #00ff41, 0 0 55px rgba(0,255,65,0.6);
      margin-bottom: 22px;
      letter-spacing: 6px;
      animation: flicker 3s infinite;
    }

    #overlay .sub-title {
      font-size: 11px;
      color: #ffff00;
      text-shadow: 0 0 8px #ffff00, 0 0 18px rgba(255,255,0,0.4);
      margin-bottom: 28px;
      letter-spacing: 2px;
    }

    #overlay .press-start {
      font-size: 8px;
      color: #00ff41;
      animation: blink 1.1s step-end infinite;
      letter-spacing: 1px;
    }

    #overlay .final-score {
      font-size: 8px;
      color: #aaa;
      margin-top: 14px;
      letter-spacing: 1px;
    }

    /* ── AI toggle button ────────────────────────────────────── */
    #ai-btn {
      border: 2px solid #00cc33;
      padding: 10px 12px;
      background: rgba(0,255,65,0.02);
      box-shadow: 0 0 6px rgba(0,255,65,0.35), inset 0 0 10px rgba(0,255,65,0.04);
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, box-shadow 0.15s;
    }

    #ai-btn:hover {
      background: rgba(0,255,65,0.06);
    }

    #ai-btn .box-label {
      margin-bottom: 6px;
    }

    #ai-status {
      font-size: 10px;
      font-family: 'Press Start 2P', monospace;
      color: #444;
      text-shadow: none;
      transition: color 0.15s, text-shadow 0.15s;
    }

    #ai-status.on {
      color: #00ff41;
      text-shadow: 0 0 8px #00ff41, 0 0 18px rgba(0,255,65,0.6);
      animation: blink 1s step-end infinite;
    }

    @keyframes flicker {
      0%,88%,100% { opacity:1; }
      90% { opacity:0.75; }
      92% { opacity:1; }
      94% { opacity:0.6; }
      96% { opacity:1; }
    }

    @keyframes blink {
      0%,100% { opacity:1; }
      50%      { opacity:0; }
    }

    #next-canvas, #hold-canvas {
      display: block;
      margin: 4px auto 0;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- ── Left panel ─────────────────────────────────── -->
  <div class="panel">
    <div id="game-title">TETRIS</div>

    <div class="box">
      <div class="box-label">SCORE</div>
      <div class="box-value" id="score-val">0</div>
    </div>

    <div class="box">
      <div class="box-label">HI-SCORE</div>
      <div class="box-value" id="hi-val">0</div>
    </div>

    <div class="box">
      <div class="box-label">LEVEL</div>
      <div class="box-value" id="level-val">1</div>
    </div>

    <div class="box">
      <div class="box-label">LINES</div>
      <div class="box-value" id="lines-val">0</div>
    </div>

    <div class="box">
      <div class="box-label">HOLD  [C]</div>
      <canvas id="hold-canvas" width="124" height="72"></canvas>
    </div>

    <!-- AI toggle -->
    <div id="ai-btn" title="Press A to toggle">
      <div class="box-label">AI  [A]</div>
      <div id="ai-status">OFF</div>
    </div>
  </div>

  <!-- ── Game board ─────────────────────────────────── -->
  <div id="canvas-wrap">
    <canvas id="board" width="300" height="600"></canvas>

    <div id="overlay">
      <div class="big-title">TETRIS</div>
      <div class="sub-title" id="ol-sub">READY?</div>
      <div class="press-start" id="ol-msg">PRESS ENTER TO START</div>
      <div class="final-score" id="ol-score"></div>
    </div>
  </div>

  <!-- ── Right panel ────────────────────────────────── -->
  <div class="panel">
    <div class="box">
      <div class="box-label">NEXT</div>
      <canvas id="next-canvas" width="124" height="96"></canvas>
    </div>

    <div class="box">
      <div class="box-label">CONTROLS</div>
      <div class="controls-text">
        ← →  MOVE<br>
        ↑    ROTATE CW<br>
        Z    ROTATE CCW<br>
        ↓    SOFT DROP<br>
        SPC  HARD DROP<br>
        C    HOLD<br>
        A    AI MODE<br>
        P    PAUSE<br>
        ESC  MENU
      </div>
    </div>
  </div>

</div><!-- .wrapper -->

<script type="module">
  import init, {
    queue_ai_move,
    get_spawn_count,
    get_game_active,
    best_move,
  } from './pkg/tetris_wasm.js';

  // ── Full-page scaling ──────────────────────────────────────────
  const NATURAL_W = 624, NATURAL_H = 640;
  function fitToScreen() {
    const scale = Math.min(window.innerWidth / NATURAL_W, window.innerHeight / NATURAL_H) * 0.97;
    document.querySelector('.wrapper').style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', fitToScreen);
  fitToScreen();

  // ── AI state ───────────────────────────────────────────────────
  let aiEnabled = false;
  let lastSpawnCount = -1;

  const aiBtn    = document.getElementById('ai-btn');
  const aiStatus = document.getElementById('ai-status');

  function setAI(on) {
    aiEnabled = on;
    aiStatus.textContent = on ? 'ON' : 'OFF';
    aiStatus.className   = on ? 'on' : '';
    if (on) lastSpawnCount = get_spawn_count(); // don't replay current piece
  }

  aiBtn.addEventListener('click', () => setAI(!aiEnabled));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'a' || e.key === 'A') setAI(!aiEnabled);
  });

  function aiTick() {
    if (!aiEnabled || !get_game_active()) return;
    const spawnCount = get_spawn_count();
    if (spawnCount === lastSpawnCount) return;
    lastSpawnCount = spawnCount;
    const move = best_move();
    if (move[0] >= 0) queue_ai_move(move[0], move[1]);
  }

  // ── Boot ───────────────────────────────────────────────────────
  await init();
  setInterval(aiTick, 50);
</script>
</body>
</html>
